services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: banking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET Backend API
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: banking-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5200
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};SearchPath=banking"
      JwtSettings__SecretKey: ${JWT_SECRET}
      JwtSettings__Issuer: "BankingAPI"
      JwtSettings__Audience: "BankingApp"
      JwtSettings__ExpirationMinutes: "60"
    ports:
      - "5200:5200"
    networks:
      - banking-network
    depends_on:
      postgres:
        condition: service_healthy

  # ngrok tunnel — exposes backend port 5200 to the internet
  # Required for Expo Go on a physical device
  ngrok:
    image: ngrok/ngrok:latest
    container_name: banking-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http backend:5200 --log stdout
    ports:
      - "4041:4040"   # ngrok web UI available at http://localhost:4041
    networks:
      - banking-network
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  banking-network:
    driver: bridge

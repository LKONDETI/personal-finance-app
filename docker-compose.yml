services:
  # .NET Backend API
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: banking-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5200
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST};Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};SearchPath=banking;SSL Mode=Require;Trust Server Certificate=true"
      JwtSettings__SecretKey: ${JWT_SECRET}
      JwtSettings__Issuer: "BankingAPI"
      JwtSettings__Audience: "BankingApp"
      JwtSettings__ExpirationMinutes: "60"
      # AI Advisor — AWS credentials (only needed when AI_MOCK_MODE=false)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AiAdvisor__Region: ${AWS_REGION:-us-east-1}
      AiAdvisor__MockMode: ${AI_MOCK_MODE:-true}
      AiAdvisor__MaxTokens: ${AI_MAX_TOKENS_PER_RESPONSE:-512}
    ports:
      - "5200:5200"
    networks:
      - banking-network

  # ngrok tunnel — exposes backend port 5200 to the internet
  ngrok:
    image: ngrok/ngrok:latest
    container_name: banking-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http backend:5200 --log stdout
    ports:
      - "4041:4040"
    networks:
      - banking-network
    depends_on:
      - backend

networks:
  banking-network:
    driver: bridge
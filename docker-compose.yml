version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: banking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Database Management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: banking-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - banking-network
    depends_on:
      - postgres

  # .NET Backend API
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: banking-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5200
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: "BankingAPI"
      Jwt__Audience: "BankingApp"
      Jwt__ExpirationMinutes: "60"
    ports:
      - "5200:5200"
    networks:
      - banking-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./Backend/BankingAPI:/app/src
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        dotnet BankingAPI.dll
      "

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  banking-network:
    driver: bridge
